# Dependabot configuration.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Routine version updates are batched into a single weekly PR. Security
# advisories are handled by GitHub's separate Dependabot security-updates
# feature (Settings → Code security & analysis), which bypasses this schedule
# and opens individual PRs immediately when a vulnerability is matched.

version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      # Keep @types/node aligned with the Node runtime declared in engines (22.x).
      # Major bumps ship type definitions for newer Node lines than we run, which
      # lets tsc approve APIs absent at runtime. Minor/patch updates still flow.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
