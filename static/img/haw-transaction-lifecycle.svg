<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" width="1120" height="560" role="img" aria-labelledby="t d" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<title id="t">Nitro transaction lifecycle</title>
<desc id="d">Transactions enter from JSON-RPC, retryable tickets, or the delayed inbox, are ordered by the Sequencer (which also publishes a soft-confirmation feed), then batched and compressed. Batches are posted to the L1 parent chain as blobs or calldata, and the ordered transactions are run through the State Transition Function, which reads and writes chain state and emits an L2 block that is also settled on L1.</desc>
