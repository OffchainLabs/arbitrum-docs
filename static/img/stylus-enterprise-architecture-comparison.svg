<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 420" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FFFFFF" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF7700" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00CC88" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1500" height="420" rx="12" fill="#1C1C2E" />

  <!-- ========== LEFT SIDE: Traditional Architecture ========== -->

  <!-- Title -->
  <text x="300" y="38" fill="#FFFFFF" font-size="18" font-weight="bold" text-anchor="middle">Traditional architecture</text>
  <text x="300" y="60" fill="#999999" font-size="13" text-anchor="middle">Computation is opaque — clients trust the vendor</text>

  <!-- Client -->
  <rect x="50" y="110" width="110" height="55" rx="8" fill="#9DCCED" stroke="#FFFFFF" stroke-width="1.5" />
  <text x="105" y="143" fill="#FFFFFF" font-size="14" text-anchor="middle">Client</text>

  <!-- Arrow: Client -> API Gateway -->
  <line x1="160" y1="137" x2="215" y2="137" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrowWhite)" />
  <text x="187" y="128" fill="#FFFFFF" font-size="11" text-anchor="middle">Request</text>

  <!-- API Gateway -->
  <rect x="220" y="110" width="130" height="55" rx="8" fill="#12AAFF" stroke="#FFFFFF" stroke-width="1.5" />
  <text x="285" y="143" fill="#FFFFFF" font-size="14" text-anchor="middle">API gateway</text>

  <!-- Arrow: API Gateway -> Backend -->
  <line x1="350" y1="137" x2="395" y2="137" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrowWhite)" />

  <!-- Backend Service (black box) -->
  <rect x="400" y="100" width="150" height="75" rx="8" fill="#E3066E" stroke="#FFFFFF" stroke-width="1.5" />
  <!-- Process bars -->
  <line x1="415" y1="100" x2="415" y2="175" stroke="#FFFFFF" stroke-width="1" opacity="0.4" />
  <line x1="535" y1="100" x2="535" y2="175" stroke="#FFFFFF" stroke-width="1" opacity="0.4" />
  <text x="475" y="133" fill="#FFFFFF" font-size="14" text-anchor="middle">Business logic</text>
  <text x="475" y="153" fill="#CCCCCC" font-size="11" text-anchor="middle">(opaque)</text>

  <!-- Arrow: Backend -> Database -->
  <line x1="475" y1="175" x2="475" y2="230" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrowWhite)" />

  <!-- Database -->
  <ellipse cx="475" cy="242" rx="50" ry="12" fill="#12AAFF" stroke="#FFFFFF" stroke-width="1.5" />
  <rect x="425" y="242" width="100" height="40" fill="#12AAFF" stroke="none" />
  <line x1="425" y1="242" x2="425" y2="282" stroke="#FFFFFF" stroke-width="1.5" />
  <line x1="525" y1="242" x2="525" y2="282" stroke="#FFFFFF" stroke-width="1.5" />
  <ellipse cx="475" cy="282" rx="50" ry="12" fill="#12AAFF" stroke="#FFFFFF" stroke-width="1.5" />
  <text x="475" y="268" fill="#FFFFFF" font-size="14" text-anchor="middle">Database</text>

  <!-- Trust callout -->
  <rect x="50" y="230" width="230" height="50" rx="8" fill="none" stroke="#FF7700" stroke-width="2" stroke-dasharray="6,3" />
  <text x="165" y="252" fill="#FF7700" font-size="12" text-anchor="middle">No independent verification.</text>
  <text x="165" y="270" fill="#FF7700" font-size="12" text-anchor="middle">Client trusts the result.</text>

  <!-- Dashed arrow from Client to callout -->
  <line x1="105" y1="165" x2="105" y2="225" stroke="#FF7700" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowOrange)" />

  <!-- ========== DIVIDER ========== -->
  <line x1="620" y1="20" x2="620" y2="400" stroke="#444444" stroke-width="2" />

  <!-- ========== RIGHT SIDE: Stylus Architecture ========== -->

  <!-- Title -->
  <text x="1050" y="38" fill="#FFFFFF" font-size="18" font-weight="bold" text-anchor="middle">With Stylus</text>
  <text x="1050" y="60" fill="#999999" font-size="13" text-anchor="middle">Critical logic is verifiable — blockchain as a compute layer</text>

  <!-- Client -->
  <rect x="650" y="170" width="110" height="55" rx="8" fill="#9DCCED" stroke="#FFFFFF" stroke-width="1.5" />
  <text x="705" y="203" fill="#FFFFFF" font-size="14" text-anchor="middle">Client</text>

  <!-- Arrow: Client -> API Gateway -->
  <line x1="760" y1="197" x2="815" y2="197" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrowWhite)" />
  <text x="787" y="188" fill="#FFFFFF" font-size="11" text-anchor="middle">Request</text>

  <!-- API Gateway -->
  <rect x="820" y="170" width="130" height="55" rx="8" fill="#12AAFF" stroke="#FFFFFF" stroke-width="1.5" />
  <text x="885" y="203" fill="#FFFFFF" font-size="14" text-anchor="middle">API gateway</text>

  <!-- Arrow: API Gateway -> Backend -->
  <line x1="950" y1="197" x2="1005" y2="197" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrowWhite)" />

  <!-- Backend Services -->
  <rect x="1010" y="170" width="130" height="55" rx="8" fill="#12AAFF" stroke="#FFFFFF" stroke-width="1.5" />
  <line x1="1025" y1="170" x2="1025" y2="225" stroke="#FFFFFF" stroke-width="1" opacity="0.4" />
  <line x1="1125" y1="170" x2="1125" y2="225" stroke="#FFFFFF" stroke-width="1" opacity="0.4" />
  <text x="1075" y="195" fill="#FFFFFF" font-size="14" text-anchor="middle">Backend</text>
  <text x="1075" y="213" fill="#FFFFFF" font-size="14" text-anchor="middle">services</text>

  <!-- Arrow: Backend -> Database -->
  <line x1="1075" y1="170" x2="1075" y2="135" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrowWhite)" />

  <!-- Database (right) -->
  <ellipse cx="1075" cy="123" rx="45" ry="10" fill="#12AAFF" stroke="#FFFFFF" stroke-width="1.5" />
  <rect x="1030" y="88" width="90" height="35" fill="#12AAFF" stroke="none" />
  <line x1="1030" y1="88" x2="1030" y2="123" stroke="#FFFFFF" stroke-width="1.5" />
  <line x1="1120" y1="88" x2="1120" y2="123" stroke="#FFFFFF" stroke-width="1.5" />
  <ellipse cx="1075" cy="88" rx="45" ry="10" fill="#12AAFF" stroke="#FFFFFF" stroke-width="1.5" />
  <text x="1075" y="112" fill="#FFFFFF" font-size="13" text-anchor="middle">Database</text>

  <!-- Arrow: Backend -> Stylus container -->
  <line x1="1140" y1="197" x2="1195" y2="197" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrowWhite)" />
  <text x="1167" y="188" fill="#CCCCCC" font-size="10" text-anchor="middle">Critical logic</text>

  <!-- Stylus container (Arbitrum) -->
  <rect x="1200" y="86" width="270" height="265" rx="10" fill="none" stroke="#E3066E" stroke-width="2.5" />
  <text x="1335" y="107" fill="#FFFFFF" font-size="13" font-weight="bold" text-anchor="middle">Arbitrum (Stylus)</text>

  <!-- WASM VM -->
  <rect x="1220" y="125" width="230" height="55" rx="8" fill="#E3066E" stroke="#FFFFFF" stroke-width="1.5" />
  <text x="1335" y="150" fill="#FFFFFF" font-size="14" text-anchor="middle">WASM VM</text>
  <text x="1335" y="168" fill="#CCCCCC" font-size="11" text-anchor="middle">(Rust / C++)</text>

  <!-- EVM -->
  <rect x="1220" y="200" width="230" height="55" rx="8" fill="#E3066E" stroke="#FFFFFF" stroke-width="1.5" />
  <text x="1335" y="225" fill="#FFFFFF" font-size="14" text-anchor="middle">EVM</text>
  <text x="1335" y="243" fill="#CCCCCC" font-size="11" text-anchor="middle">(Solidity)</text>

  <!-- Interop dashed arrow -->
  <line x1="1335" y1="180" x2="1335" y2="196" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="4,3" />
  <text x="1370" y="193" fill="#999999" font-size="10">Interop</text>

  <!-- Shared onchain state -->
  <rect x="1240" y="275" width="190" height="35" rx="6" fill="#12AAFF" stroke="#FFFFFF" stroke-width="1.5" />
  <text x="1335" y="298" fill="#FFFFFF" font-size="12" text-anchor="middle">Shared onchain state</text>

  <!-- Arrows from VMs to state -->
  <line x1="1280" y1="255" x2="1280" y2="271" stroke="#FFFFFF" stroke-width="1.5" marker-end="url(#arrowWhite)" />
  <line x1="1390" y1="255" x2="1390" y2="271" stroke="#FFFFFF" stroke-width="1.5" marker-end="url(#arrowWhite)" />

  <!-- Audit callout -->
  <rect x="650" y="310" width="250" height="50" rx="8" fill="none" stroke="#00CC88" stroke-width="2" stroke-dasharray="6,3" />
  <text x="775" y="332" fill="#00CC88" font-size="12" text-anchor="middle">Execution is publicly verifiable.</text>
  <text x="775" y="350" fill="#00CC88" font-size="12" text-anchor="middle">Logic is tamper-proof.</text>

  <!-- Dashed arrow from Client to audit callout -->
  <line x1="705" y1="225" x2="705" y2="305" stroke="#00CC88" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)" />

</svg>
